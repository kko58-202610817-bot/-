<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토스 스타일 스터디 플래너</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Google Fonts (Noto Sans KR) -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color, #f2f4f6);
      color: var(--text-color, #191f28);
      transition: background-color 0.3s, color 0.3s;
    }
    :root {
      --toss-blue: #3182f6;
      --toss-blue-hover: #1b64da;
      --card-bg: #ffffff;
      --border-color: #eff0f2;
      --sub-text: #8b95a1;
    }
    .dark-theme {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --card-bg: #1e293b;
      --border-color: #334155;
      --sub-text: #94a3b8;
    }
    .indigo-theme {
      --bg-color: #f0f3ff;
      --text-color: #1e1b4b;
      --card-bg: #ffffff;
      --border-color: #e0e7ff;
      --sub-text: #6366f1;
      --toss-blue: #4f46e5;
    }
    .toss-card {
      background-color: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      padding: 24px;
      border: 1px solid var(--border-color);
    }
    .toss-btn {
      background-color: var(--toss-blue);
      color: white;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 20px;
      transition: all 0.2s;
    }
    .toss-btn:hover {
      background-color: var(--toss-blue-hover);
      transform: translateY(-1px);
    }
    .toss-input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      color: var(--text-color);
      outline: none;
    }
    .toss-input:focus {
      border-color: var(--toss-blue);
    }
  </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

  <!-- [신규 기능] 로그인 / 비밀번호 설정 화면 -->
  <div id="loginScreen" class="fixed inset-0 bg-[var(--bg-color)] z-50 flex items-center justify-center p-4">
    <div class="bg-[var(--card-bg)] text-[var(--text-color)] w-full max-w-sm p-6 rounded-3xl border border-[var(--border-color)] shadow-2xl text-center">
      <h2 class="text-xl font-bold text-[var(--toss-blue)] mb-2 flex items-center justify-center gap-2">
        <i class="fa-solid fa-lock"></i> toss study
      </h2>
      <p id="loginPrompt" class="text-xs text-[var(--sub-text)] mb-6">플래너 잠금을 해제하기 위해 비밀번호를 입력하세요.</p>
      
      <div class="flex flex-col gap-3">
        <input type="password" id="loginPassword" placeholder="비밀번호 입력" class="toss-input text-center text-lg tracking-widest">
        <button id="loginBtn" class="toss-btn w-full py-3">확인</button>
      </div>
    </div>
  </div>

  <!-- 메인 서비스 레이아웃 (로그인 전에는 보이지 않음) -->
  <div id="mainContent" class="opacity-0 transition-opacity duration-500 pointer-events-none">
    
    <!-- 상단 헤더 -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-[var(--toss-blue)] flex items-center gap-2">
          <i class="fa-solid fa-graduation-cap"></i> toss study
        </h1>
        <p class="text-sm text-[var(--sub-text)] mt-1">나만의 스마트한 학습 파트너</p>
      </div>
      <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-end">
        <button id="openApiModalBtn" class="py-2 px-3 text-xs font-semibold rounded-xl border border-[var(--border-color)] bg-[var(--card-bg)] shadow-xs flex items-center gap-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
          <i class="fa-solid fa-server text-blue-500"></i> 나이스 연동 설정
        </button>
        <button id="logoutBtn" class="py-2 px-3 text-xs font-semibold rounded-xl border border-red-200 text-red-500 bg-[var(--card-bg)] hover:bg-red-50 transition-all">
          <i class="fa-solid fa-right-from-bracket"></i> 잠금
        </button>

        <div class="flex items-center gap-2">
          <select id="themeSelect" class="toss-input py-1 px-2 text-sm">
            <option value="default">토스 화이트</option>
            <option value="dark">다크 모드</option>
            <option value="indigo">클래식 인디고</option>
          </select>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- 왼쪽 컬럼 -->
      <div class="md:col-span-1 flex flex-col gap-6">
        <section class="toss-card flex flex-col items-center text-center">
          <h2 class="text-lg font-bold w-full text-left mb-4 flex items-center justify-between">
            <span>My 캐릭터</span>
            <span id="rewardPoints" class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full">0p</span>
          </h2>
          <div class="relative w-32 h-32 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-5xl mb-4 shadow-inner">
            <span id="charBody">👶</span>
            <span id="charItem" class="absolute top-2 right-2 text-2xl"></span>
          </div>
          <div class="w-full mb-4">
            <div id="timerDisplay" class="text-3xl font-bold tracking-widest mb-2">00:00:00</div>
            <button id="timerBtn" class="toss-btn w-full"><i class="fa-solid fa-play mr-1"></i> 공부 시작</button>
          </div>
          <div class="w-full border-t border-[var(--border-color)] pt-3 text-left">
            <div class="grid grid-cols-3 gap-2 text-center text-xs">
              <button onclick="buyItem('', 0)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">기본</button>
              <button onclick="buyItem('🎓', 10)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">학사모 (10p)</button>
              <button onclick="buyItem('👑', 30)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">왕관 (30p)</button>
            </div>
          </div>
        </section>

        <section class="toss-card">
          <h2 class="text-lg font-bold mb-4"><i class="fa-solid fa-shield-halved text-green-500 mr-2"></i>스터디 랭킹</h2>
          <ul id="friendList" class="space-y-2 max-h-56 overflow-y-auto"></ul>
          <button id="resetDataBtn" class="w-full mt-4 py-2 text-xs font-semibold rounded-xl text-red-500 border border-red-200 hover:bg-red-50 transition-all">
            데이터 전면 초기화
          </button>
        </section>
      </div>

      <!-- 오른쪽 컬럼 -->
      <div class="md:col-span-2 flex flex-col gap-6">
        <section class="toss-card flex-1">
          <h2 class="text-lg font-bold mb-4"><i class="fa-solid fa-list-check text-indigo-500 mr-2"></i>오늘의 할 일</h2>
          <div class="flex flex-col sm:flex-row gap-2 mb-6">
            <input type="text" id="todoInput" placeholder="어떤 공부를 하실 건가요?" class="toss-input flex-1">
            <input type="date" id="todoDate" class="toss-input">
            <button id="addTodoBtn" class="toss-btn">등록</button>
          </div>

          <!-- 나이스 학사 일정 피드 구역 -->
          <div id="neisScheduleBox" class="mb-6 p-4 bg-blue-50/50 dark:bg-blue-950/20 border border-blue-100 rounded-2xl hidden">
            <h3 class="text-xs font-bold text-blue-600 mb-2"><i class="fa-solid fa-calendar-minus"></i> 다가오는 학교 학사일정</h3>
            <ul id="neisScheduleList" class="space-y-1.5 text-xs"></ul>
          </div>

          <ul id="todoList" class="space-y-2"></ul>
        </section>

        <!-- 바탕화면 위젯 -->
        <section class="toss-card bg-slate-900 text-white border-none relative overflow-hidden pt-8">
          <div class="absolute top-0 left-0 w-full h-6 bg-slate-800 flex items-center px-3">
            <span class="text-[10px] text-slate-400 font-mono">Desktop Widget Preview</span>
          </div>
          <div id="widgetContainer" class="bg-slate-800/60 p-3 rounded-xl border border-slate-700 space-y-1.5 text-sm min-h-[60px]"></div>
        </section>
      </div>
    </div>
  </div>

  <!-- 나이스 설정 모달 -->
  <div id="apiModal" class="fixed inset-0 bg-black/40 backdrop-blur-xs flex items-center justify-center z-50 hidden">
    <div class="bg-[var(--card-bg)] text-[var(--text-color)] w-full max-w-md mx-4 p-6 rounded-3xl border border-[var(--border-color)]">
      <h3 class="text-lg font-bold mb-4 text-[var(--toss-blue)]"><i class="fa-solid fa-key"></i> NICE 오픈 API 설정</h3>
      <div class="space-y-3">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">나이스 API 인증키(KEY)</label>
          <input type="text" id="inputNeisKey" class="toss-input text-xs font-mono">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">시도교육청코드</label>
          <input type="text" id="inputOfficeCode" placeholder="예: B10" class="toss-input text-xs">
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-semibold">행정표준코드</label>
          <input type="text" id="inputSchoolCode" placeholder="예: 7010057" class="toss-input text-xs">
        </div>
      </div>
      <div class="flex gap-2 mt-6">
        <button id="closeApiModalBtn" class="flex-1 py-3 text-sm rounded-xl bg-[var(--bg-color)] border border-[var(--border-color)] text-[var(--sub-text)]">취소</button>
        <button id="saveApiConfigBtn" class="flex-1 toss-btn py-3 text-sm">연동 및 저장</button>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl text-sm font-medium z-50 opacity-0 transition-opacity duration-300 pointer-events-none"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyANA-lTFGboIfklqQewlVk49GUQ_Am33aE",
      authDomain: "garim-study-planner.firebaseapp.com",
      projectId: "garim-study-planner",
      storageBucket: "garim-study-planner.firebasestorage.app",
      messagingSenderId: "1048447885260",
      appId: "1:1048447885260:web:935234dd0c96860583c769"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "students", "10817");

    let state = null;
    let timerInterval = null;
    let isTimerRunning = false;
    let localFetchedSchedules = [];

    // 최초 실행 시 Firebase에 데이터가 존재하는지 확인하여 암호 검증 상태 제어
    async function initSystem() {
      const docSnap = await getDoc(docRef);
      const promptEl = document.getElementById('loginPrompt');
      
      if (!docSnap.exists()) {
        promptEl.innerText = "🚨 초기 비밀번호 설정: 사용할 비밀번호를 입력 후 확인을 누르세요.";
        promptEl.classList.add('text-blue-500', 'font-bold');
      }

      document.getElementById('loginBtn').addEventListener('click', () => handleAuth(docSnap.exists()));
      document.getElementById('loginPassword').addEventListener('keyup', (e) => {
        if(e.key === 'Enter') handleAuth(docSnap.exists());
      });
    }

    async function handleAuth(isExistingUser) {
      const inputPw = document.getElementById('loginPassword').value.trim();
      if (!inputPw) {
        alert("비밀번호를 입력해 주세요.");
        return;
      }

      if (!isExistingUser) {
        // 회원 생성 (초기 비밀번호 부여)
        state = {
          password: inputPw, // 비밀번호 필드 생성
          points: 0,
          currentEquipped: "",
          todos: [],
          myTotalSeconds: 0,
          friends: [{ name: "김토스", time: 75 }, { name: "이싸피", time: 42 }],
          theme: "default",
          neisConfig: { key: "", atptCode: "", schCode: "" }
        };
        await setDoc(docRef, state);
        showToast("비밀번호 설정이 완료되었습니다!");
        unlockApp();
      } else {
        // 기존 회원 암호 대조 검증
        const docSnap = await getDoc(docRef);
        const savedData = docSnap.data();
        
        if (savedData.password === inputPw) {
          state = savedData;
          unlockApp();
        } else {
          alert("비밀번호가 일치하지 않습니다.");
          document.getElementById('loginPassword').value = "";
        }
      }
    }

    function unlockApp() {
      document.getElementById('loginScreen').classList.add('hidden');
      const mainContent = document.getElementById('mainContent');
      mainContent.classList.remove('opacity-0', 'pointer-events-none');
      
      // 실시간 데이터 스냅샷 구독 활성화
      onSnapshot(docRef, (snap) => {
        if(snap.exists()) {
          state = snap.data();
          renderAll();
          if (state.neisConfig?.key && localFetchedSchedules.length === 0) {
            fetchNeisSchedule();
          }
        }
      });
    }

    // 잠금(로그아웃) 기능 구현
    document.getElementById('logoutBtn').addEventListener('click', () => {
      location.reload(); 
    });

    async function saveData() {
      if (state) await setDoc(docRef, state);
    }

    async function fetchNeisSchedule() {
      if (!state.neisConfig?.key) return;
      const { key, atptCode, schCode } = state.neisConfig;
      const currentYear = new Date().getFullYear();
      const url = `https://open.neis.go.kr/hub/SchoolSchedule?KEY=${key}&Type=json&pIndex=1&pSize=50&ATPT_OFCDC_SC_CODE=${atptCode}&SD_SCH_CODE=${schCode}&AA_FROM_YMD=${currentYear}0101&AA_TO_YMD=${currentYear}1231`;
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        if (data.SchoolSchedule && data.SchoolSchedule[1]?.row) {
          const todayStr = new Date().toISOString().slice(0,10).replace(/-/g, "");
          localFetchedSchedules = data.SchoolSchedule[1].row
            .filter(item => item.AA_YMD >= todayStr)
            .sort((a,b) => a.AA_YMD.localeCompare(b.AA_YMD))
            .slice(0, 4);
          renderAll();
        }
      } catch (e) { console.error(e); }
    }

    function renderAll() {
      if(!state) return;
      
      document.body.className = "p-4 md:p-8 max-w-4xl mx-auto";
      if (state.theme === "dark") document.body.classList.add("dark-theme");
      if (state.theme === "indigo") document.body.classList.add("indigo-theme");

      document.getElementById('rewardPoints').innerText = `${state.points}p`;
      document.getElementById('charItem').innerText = state.currentEquipped;

      const todoListEl = document.getElementById('todoList');
      const widgetContainerEl = document.getElementById('widgetContainer');
      todoListEl.innerHTML = "";
      widgetContainerEl.innerHTML = "";

      state.todos.forEach((todo, index) => {
        const li = document.createElement('li');
        li.className = "flex items-center justify-between p-3 rounded-xl bg-[var(--bg-color)] border border-[var(--border-color)]";
        li.innerHTML = `
          <div class="flex items-center gap-2">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} class="w-4 h-4 accent-[var(--toss-blue)]" id="check-${index}">
            <span class="${todo.completed ? 'line-through text-[var(--sub-text)]' : ''} text-sm font-medium">${todo.title}</span>
          </div>
          <button id="del-${index}" class="text-xs text-red-400"><i class="fa-regular fa-trash-can"></i></button>
        `;
        todoListEl.appendChild(li);
        document.getElementById(`check-${index}`).addEventListener('change', () => {
          state.todos[index].completed = !state.todos[index].completed;
          saveData();
        });
        document.getElementById(`del-${index}`).addEventListener('click', () => {
          state.todos.splice(index, 1);
          saveData();
        });

        if (!todo.completed) {
          const wItem = document.createElement('div');
          wItem.className = "text-xs text-slate-300";
          wItem.innerHTML = `◽ ${todo.title}`;
          widgetContainerEl.appendChild(wItem);
        }
      });

      if (localFetchedSchedules.length > 0) {
        const box = document.getElementById('neisScheduleBox');
        const list = document.getElementById('neisScheduleList');
        box.classList.remove('hidden');
        list.innerHTML = "";
        localFetchedSchedules.forEach(item => {
          const li = document.createElement('li');
          li.className = "flex justify-between p-2 bg-[var(--card-bg)] border border-[var(--border-color)] rounded-lg";
          li.innerHTML = `<span>📅 ${item.SCHUL_EVENT_NM}</span> <span class="text-[11px] text-[var(--sub-text)]">${item.AA_YMD.substring(4,6)}/${item.AA_YMD.substring(6,8)}</span>`;
          list.appendChild(li);
        });
      }

      // 랭킹 시스템 구성
      const friendListEl = document.getElementById('friendList');
      friendListEl.innerHTML = "";
      const myRank = { name: "나 (10817) ⭐", time: Math.floor(state.myTotalSeconds / 60), isMe: true };
      const ranks = [...state.friends, myRank].sort((a,b) => b.time - a.time);
      ranks.forEach((u, i) => {
        const li = document.createElement('li');
        li.className = `flex justify-between text-sm py-2 px-3 rounded-xl ${u.isMe ? 'bg-blue-50 dark:bg-blue-950/40 font-bold' : ''}`;
        li.innerHTML = `<span>${i+1}. ${u.name}</span><span>${u.time}분</span>`;
        friendListEl.appendChild(li);
      });
    }

    // 타이머 제어 로직
    const timerBtn = document.getElementById('timerBtn');
    timerBtn.addEventListener('click', () => {
      if (!isTimerRunning) {
        isTimerRunning = true;
        timerBtn.innerText = "일시정지";
        timerInterval = setInterval(() => {
          state.myTotalSeconds += 1;
          const hrs = String(Math.floor(state.myTotalSeconds / 3600)).padStart(2, '0');
          const mins = String(Math.floor((state.myTotalSeconds % 3600) / 60)).padStart(2, '0');
          const secs = String(state.myTotalSeconds % 60).padStart(2, '0');
          document.getElementById('timerDisplay').innerText = `${hrs}:${mins}:${secs}`;
          if (state.myTotalSeconds % 10 === 0) state.points += 1;
          if (state.myTotalSeconds % 5 === 0) saveData();
        }, 1000);
      } else {
        isTimerRunning = false;
        clearInterval(timerInterval);
        timerBtn.innerText = "공부 시작";
        saveData();
      }
    });

    document.getElementById('addTodoBtn').addEventListener('click', () => {
      const input = document.getElementById('todoInput');
      const date = document.getElementById('todoDate');
      if(!input.value || !date.value) return;
      state.todos.push({ title: input.value, date: date.value, completed: false });
      input.value = ""; date.value = "";
      saveData();
    });

    document.getElementById('openApiModalBtn').addEventListener('click', () => {
      document.getElementById('inputNeisKey').value = state.neisConfig?.key || "";
      document.getElementById('inputOfficeCode').value = state.neisConfig?.atptCode || "";
      document.getElementById('inputSchoolCode').value = state.neisConfig?.schCode || "";
      document.getElementById('apiModal').classList.remove('hidden');
    });
    document.getElementById('closeApiModalBtn').addEventListener('click', () => {
      document.getElementById('apiModal').classList.add('hidden');
    });
    document.getElementById('saveApiConfigBtn').addEventListener('click', async () => {
      state.neisConfig = {
        key: document.getElementById('inputNeisKey').value.trim(),
        atptCode: document.getElementById('inputOfficeCode').value.trim(),
        schCode: document.getElementById('inputSchoolCode').value.trim()
      };
      await saveData();
      document.getElementById('apiModal').classList.add('hidden');
      fetchNeisSchedule();
    });

    function showToast(m) {
      const t = document.getElementById('toast');
      t.innerText = m; t.classList.replace('opacity-0', 'opacity-100');
      setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
    }

    initSystem();
  </script>
</body>
</html>
