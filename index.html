<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>토스 스타일 스터디 플래너</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color, #f2f4f6);
      color: var(--text-color, #191f28);
      transition: background-color 0.3s, color 0.3s;
    }
    /* Toss Style Custom Variables */
    :root {
      --toss-blue: #3182f6;
      --toss-blue-hover: #1b64da;
      --card-bg: #ffffff;
      --border-color: #eff0f2;
      --sub-text: #8b95a1;
    }
    .dark-theme {
      --bg-color: #0f172a;
      --text-color: #f8fafc;
      --card-bg: #1e293b;
      --border-color: #334155;
      --sub-text: #94a3b8;
    }
    .indigo-theme {
      --bg-color: #f0f3ff;
      --text-color: #1e1b4b;
      --card-bg: #ffffff;
      --border-color: #e0e7ff;
      --sub-text: #6366f1;
      --toss-blue: #4f46e5;
    }
    .toss-card {
      background-color: var(--card-bg);
      border-radius: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      padding: 24px;
      border: 1px solid var(--border-color);
    }
    .toss-btn {
      background-color: var(--toss-blue);
      color: white;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 20px;
      transition: all 0.2s;
    }
    .toss-btn:hover {
      background-color: var(--toss-blue-hover);
      transform: translateY(-1px);
    }
    .toss-input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      color: var(--text-color);
      outline: none;
    }
    .toss-input:focus {
      border-color: var(--toss-blue);
    }
  </style>
</head>
<body class="p-4 md:p-8 max-w-4xl mx-auto">

  <header class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-bold tracking-tight text-[var(--toss-blue)] flex items-center gap-2">
        <i class="fa-solid fa-graduation-cap"></i> toss study
      </h1>
      <p class="text-sm text-[var(--sub-text)] mt-1">나만의 스마트한 학습 파트너</p>
    </div>
    <div class="flex items-center gap-2">
      <label for="themeSelect" class="text-xs font-medium text-[var(--sub-text)]">테마</label>
      <select id="themeSelect" class="toss-input py-1 px-2 text-sm">
        <option value="default">토스 화이트</option>
        <option value="dark">다크 모드</option>
        <option value="indigo">클래식 인디고</option>
      </select>
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div class="md:col-span-1 flex flex-col gap-6">
      
      <section class="toss-card flex flex-col items-center text-center">
        <h2 class="text-lg font-bold w-full text-left mb-4 flex items-center justify-between">
          <span>My 캐릭터</span>
          <span id="rewardPoints" class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded-full">0p</span>
        </h2>
        
        <div id="characterStage" class="relative w-32 h-32 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center text-5xl mb-4 shadow-inner">
          <span id="charBody">👶</span>
          <span id="charItem" class="absolute top-2 right-2 text-2xl"></span>
        </div>
        
        <div class="w-full mb-4">
          <div id="timerDisplay" class="text-3xl font-bold tracking-widest mb-2">00:00:00</div>
          <button id="timerBtn" class="toss-btn w-full"><i class="fa-solid fa-play mr-1"></i> 공부 시작</button>
        </div>

        <div class="w-full border-t border-[var(--border-color)] pt-3 text-left">
          <p class="text-xs font-semibold text-[var(--sub-text)] mb-2">보상 아이템 변경 (필요 포인트)</p>
          <div class="grid grid-cols-3 gap-2 text-center text-xs">
            <button onclick="buyItem('', 0)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">기본</button>
            <button onclick="buyItem('🎓', 10)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">학사모 (10p)</button>
            <button onclick="buyItem('👑', 30)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">왕관 (30p)</button>
            <button onclick="buyItem('🕶️', 50)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">선글라스(50p)</button>
            <button onclick="buyItem('🔥', 100)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">오라 (100p)</button>
            <button onclick="buyItem('🚀', 150)" class="p-2 border border-[var(--border-color)] rounded-lg bg-[var(--bg-color)]">로켓 (150p)</button>
          </div>
        </div>
      </section>

      <section class="toss-card flex flex-col justify-between">
        <div>
          <h2 class="text-lg font-bold mb-1"><i class="fa-solid fa-shield-halved text-green-500 mr-2"></i>스터디 랭킹</h2>
          <p class="text-[11px] text-[var(--sub-text)] mb-4">⚠️ 공부 시간은 타이머 측정값으로만 자동 기록됩니다.</p>
          
          <ul id="friendList" class="space-y-2 max-h-56 overflow-y-auto pr-1">
            </ul>
        </div>
        
        <div class="mt-6 border-t border-dashed border-[var(--border-color)] pt-4">
          <button id="resetDataBtn" class="w-full py-2.5 text-xs font-semibold rounded-xl text-red-500 border border-red-200 hover:bg-red-50 dark:hover:bg-red-950/20 transition-all flex items-center justify-center gap-1.5">
            <i class="fa-solid fa-trash-can-arrow-up"></i> 내 랭킹 데이터 전면 초기화
          </button>
        </div>
      </section>

    </div>

    <div class="md:col-span-2 flex flex-col gap-6">
      
      <section class="toss-card flex-1">
        <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
          <span><i class="fa-solid fa-list-check text-indigo-500 mr-2"></i>오늘의 할 일</span>
          <span class="text-xs text-red-500 font-normal"><i class="fa-regular fa-bell"></i> 마감 1일 전 알림 자동 감지</span>
        </h2>
        
        <div class="flex flex-col sm:flex-row gap-2 mb-4">
          <input type="text" id="todoInput" placeholder="어떤 공부를 하실 건가요?" class="toss-input flex-1">
          <input type="date" id="todoDate" class="toss-input">
          <button id="addTodoBtn" class="toss-btn">등록</button>
        </div>

        <ul id="todoList" class="space-y-2">
          </ul>
      </section>

      <section class="toss-card bg-slate-900 text-white border-none relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-6 bg-slate-800 flex items-center px-3 gap-1.5">
          <span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-yellow-500 inline-block"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
          <span class="text-[10px] text-slate-400 ml-2 font-mono">Desktop Widget Preview</span>
        </div>
        <div class="pt-6 mt-2">
          <p class="text-xs text-slate-400 font-semibold mb-2 flex justify-between">
            <span>📌 바탕화면 투두 위젯</span>
            <span class="text-[10px] text-blue-400 cursor-pointer hover:underline" onclick="alert('브라우저의 알림 권한을 허용하시면 시스템 알림이 작동합니다.')">알림 권한 테스트</span>
          </p>
          <div id="widgetContainer" class="bg-slate-800/60 p-3 rounded-xl border border-slate-700 space-y-1.5 text-sm min-h-[60px]">
            </div>
        </div>
      </section>

    </div>
  </div>

  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl text-sm font-medium z-50 opacity-0 transition-opacity duration-300 pointer-events-none">
    알림 메시지
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 제공된 Firebase 설정
    const firebaseConfig = {
      apiKey: "AIzaSyANA-lTFGboIfklqQewlVk49GUQ_Am33aE",
      authDomain: "garim-study-planner.firebaseapp.com",
      projectId: "garim-study-planner",
      storageBucket: "garim-study-planner.firebasestorage.app",
      messagingSenderId: "1048447885260",
      appId: "1:1048447885260:web:935234dd0c96860583c769"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 지정된 단일 문서 참조 생성 (students/10817)
    const docRef = doc(db, "students", "10817");

    // 초기화 상태 팩토리용 기본 데이터 객체
    const getInitialState = () => ({
      points: 0,
      currentEquipped: "",
      todos: [],
      myTotalSeconds: 0, 
      friends: [
        { name: "김토스", time: 75 },
        { name: "이싸피", time: 42 },
        { name: "박성실", time: 15 }
      ],
      theme: "default"
    });

    // 로컬 상태 객체
    let state = getInitialState();

    // 타이머 변수
    let timerInterval = null;
    let isTimerRunning = false;

    // 브라우저 알림 권한 요청
    if (Notification.permission === "default") {
      Notification.requestPermission();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.innerText = message;
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100');
      setTimeout(() => {
        toast.classList.remove('opacity-100');
        toast.classList.add('opacity-0');
      }, 3000);
    }

    function sendDesktopNotification(title, body) {
      if (Notification.permission === "granted") {
        new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/2991/2991166.png" });
      }
    }

    // Firebase 실시간 동기화
    onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        state = { ...state, ...docSnap.data() };
        renderAll();
        checkDeadlines();
        updateTimerDisplay();
      } else {
        saveData();
      }
    });

    async function saveData() {
      try {
        await setDoc(docRef, state);
      } catch (e) {
        console.error("데이터 저장 실패:", e);
      }
    }

    function renderAll() {
      // 1. 테마 적용
      document.body.className = "p-4 md:p-8 max-w-4xl mx-auto";
      if (state.theme === "dark") document.body.classList.add("dark-theme");
      if (state.theme === "indigo") document.body.classList.add("indigo-theme");
      document.getElementById('themeSelect').value = state.theme;

      // 2. 포인트 및 아바타
      document.getElementById('rewardPoints').innerText = `${state.points}p`;
      document.getElementById('charItem').innerText = state.currentEquipped;

      // 3. 할 일 목록 & 위젯 렌더링
      const todoListEl = document.getElementById('todoList');
      const widgetContainerEl = document.getElementById('widgetContainer');
      todoListEl.innerHTML = "";
      widgetContainerEl.innerHTML = "";

      if (state.todos.length === 0) {
        todoListEl.innerHTML = `<li class="text-sm text-[var(--sub-text)] text-center py-6">등록된 할 일이 없습니다.</li>`;
        widgetContainerEl.innerHTML = `<p class="text-xs text-slate-500 text-center py-2">할 일이 비어있습니다.</p>`;
      }

      state.todos.forEach((todo, index) => {
        const today = new Date();
        today.setHours(0,0,0,0);
        const limitDate = new Date(todo.date);
        limitDate.setHours(0,0,0,0);
        const diffDays = Math.ceil((limitDate - today) / (1000 * 60 * 60 * 24));
        
        let badgeHTML = "";
        if (diffDays === 1) {
          badgeHTML = `<span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">마감 1일전!</span>`;
        } else if (diffDays === 0) {
          badgeHTML = `<span class="bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">오늘 마감</span>`;
        } else if (diffDays < 0) {
          badgeHTML = `<span class="bg-slate-500 text-white text-[10px] px-1.5 py-0.5 rounded">만료</span>`;
        } else {
          badgeHTML = `<span class="bg-slate-200 text-slate-700 text-[10px] px-1.5 py-0.5 rounded">D-${diffDays}</span>`;
        }

        const li = document.createElement('li');
        li.className = "flex items-center justify-between p-3 rounded-xl bg-[var(--bg-color)] border border-[var(--border-color)]";
        li.innerHTML = `
          <div class="flex items-center gap-2">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} class="w-4 h-4 accent-[var(--toss-blue)]" id="check-${index}">
            <span class="${todo.completed ? 'line-through text-[var(--sub-text)]' : ''} text-sm font-medium">${todo.title}</span>
            ${badgeHTML}
          </div>
          <button id="del-${index}" class="text-xs text-red-400 hover:text-red-600"><i class="fa-regular fa-trash-can"></i></button>
        `;
        todoListEl.appendChild(li);

        document.getElementById(`check-${index}`).addEventListener('change', () => toggleTodo(index));
        document.getElementById(`del-${index}`).addEventListener('click', () => deleteTodo(index));

        if (!todo.completed) {
          const widgetItem = document.createElement('div');
          widgetItem.className = "flex justify-between items-center text-xs text-slate-300 py-0.5 border-b border-slate-700/50 last:border-none";
          widgetItem.innerHTML = `<span>◽ ${todo.title}</span> <span class="text-[10px] text-amber-400">${diffDays === 1 ? '내일 마감!' : todo.date}</span>`;
          widgetContainerEl.appendChild(widgetItem);
        }
      });

      // 4. 무결성 실시간 학습 랭킹 시스템
      const friendListEl = document.getElementById('friendList');
      friendListEl.innerHTML = "";

      const myCalculatedMinutes = Math.floor(state.myTotalSeconds / 60);
      const myProfile = { name: "나 (10817) ⭐", time: myCalculatedMinutes, isMe: true };
      const allRankings = [...state.friends, myProfile];

      allRankings.sort((a, b) => b.time - a.time);
      
      allRankings.forEach((user, idx) => {
        const li = document.createElement('li');
        li.className = `flex items-center justify-between text-sm py-2.5 px-3 rounded-xl ${user.isMe ? 'bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-900' : 'border-b border-[var(--border-color)]'}`;
        
        let rankMedal = `${idx + 1}.`;
        if(idx === 0) rankMedal = "🥇";
        if(idx === 1) rankMedal = "🥈";
        if(idx === 2) rankMedal = "🥉";

        li.innerHTML = `
          <span class="font-medium ${user.isMe ? 'text-[var(--toss-blue)] font-bold' : ''}">${rankMedal} ${user.name}</span>
          <span class="text-xs ${user.isMe ? 'bg-[var(--toss-blue)] text-white' : 'text-[var(--sub-text)] bg-[var(--bg-color)]'} px-2.5 py-1 rounded-md font-mono font-semibold">${user.time}분</span>
        `;
        friendListEl.appendChild(li);
      });
    }

    function checkDeadlines() {
      state.todos.forEach(todo => {
        if (!todo.completed && !todo.alerted) {
          const today = new Date();
          today.setHours(0,0,0,0);
          const limitDate = new Date(todo.date);
          limitDate.setHours(0,0,0,0);
          const diffDays = Math.ceil((limitDate - today) / (1000 * 60 * 60 * 24));
          
          if (diffDays === 1) {
            sendDesktopNotification("🚨 마감 임박 알림", `[${todo.title}] 마감일이 1일 남았습니다!`);
            todo.alerted = true;
            saveData();
          }
        }
      });
    }

    // 타이머 제어 및 무결성 누적
    const timerBtn = document.getElementById('timerBtn');
    const timerDisplay = document.getElementById('timerDisplay');

    timerBtn.addEventListener('click', () => {
      if (!isTimerRunning) {
        isTimerRunning = true;
        timerBtn.innerHTML = `<i class="fa-solid fa-pause mr-1"></i> 일시정지`;
        timerBtn.classList.replace('bg-[var(--toss-blue)]', 'bg-amber-500');
        
        timerInterval = setInterval(() => {
          state.myTotalSeconds += 1;
          updateTimerDisplay();

          if (state.myTotalSeconds % 10 === 0) {
            state.points += 1;
          }
          
          if (state.myTotalSeconds % 5 === 0) {
            saveData();
          }
        }, 1000);
      } else {
        stopTimer();
      }
    });

    function stopTimer() {
      if(isTimerRunning) {
        isTimerRunning = false;
        clearInterval(timerInterval);
        timerBtn.innerHTML = `<i class="fa-solid fa-play mr-1"></i> 공부 시작`;
        timerBtn.className = "toss-btn w-full";
        saveData();
      }
    }

    function updateTimerDisplay() {
      const totalSecs = state.myTotalSeconds;
      const hrs = String(Math.floor(totalSecs / 3600)).padStart(2, '0');
      const mins = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0');
      const secs = String(totalSecs % 60).padStart(2, '0');
      timerDisplay.innerText = `${hrs}:${mins}:${secs}`;
    }

    // [요청 기능] 데이터베이스의 랭킹 및 저장값 전면 초기화 액션
    document.getElementById('resetDataBtn').addEventListener('click', async () => {
      const check = confirm("⚠️ 정말로 공부 기록을 리셋할까요?\n내 공부 시간, 적립된 포인트, 장착된 아이템 및 할 일 목록이 모두 데이터베이스에서 초기화됩니다.");
      if (check) {
        stopTimer(); // 타이머 가동 중이면 중지
        state = getInitialState(); // 상태값을 완전 초기 포맷으로 덮어씀
        await saveData(); // Firestore (students/10817) 문서 갱신
        showToast("데이터베이스의 모든 랭킹 및 학습 데이터가 리셋되었습니다.");
      }
    });

    window.buyItem = function(itemIcon, cost) {
      if (state.points >= cost) {
        if(cost > 0 && state.currentEquipped !== itemIcon) {
          state.points -= cost;
        }
        state.currentEquipped = itemIcon;
        showToast(itemIcon ? `아이템(${itemIcon})을 장착했습니다!` : "기본 스타일로 되돌렸습니다.");
        saveData();
      } else {
        showToast("포인트가 부족합니다. 타이머를 켜고 더 공부해 보세요!");
      }
    };

    document.getElementById('addTodoBtn').addEventListener('click', () => {
      const titleInput = document.getElementById('todoInput');
      const dateInput = document.getElementById('todoDate');

      if (!titleInput.value || !dateInput.value) {
        showToast("할 일과 마감일을 모두 채워주세요.");
        return;
      }

      state.todos.push({
        title: titleInput.value,
        date: dateInput.value,
        completed: false,
        alerted: false
      });

      titleInput.value = "";
      dateInput.value = "";
      showToast("새로운 할 일이 추가되었습니다.");
      saveData();
    });

    function toggleTodo(index) {
      state.todos[index].completed = !state.todos[index].completed;
      saveData();
    }

    function deleteTodo(index) {
      state.todos.splice(index, 1);
      showToast("할 일이 삭제되었습니다.");
      saveData();
    }

    document.getElementById('themeSelect').addEventListener('change', (e) => {
      state.theme = e.target.value;
      saveData();
    });
  </script>
</body>
</html>
